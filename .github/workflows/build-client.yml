name: Build Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: skycraft-client-linux-x86_64
            binary: skycraft-client
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: skycraft-client-windows-x86_64
            binary: skycraft-client.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: skycraft-client-macos-arm64
            binary: skycraft-client

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxcb1-dev libxkbcommon-dev libwayland-dev libvulkan-dev

      - name: Build
        run: cargo build --release -p skycraft-client --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/${BINARY}" dist/
          cp scripts/download_assets.sh dist/
          cd dist && tar czf "../${ARTIFACT}.tar.gz" *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          mkdir dist
          copy "target\${env:TARGET}\release\${env:BINARY}" dist\
          copy scripts\download_assets.sh dist\
          Compress-Archive -Path dist\* -DestinationPath "${env:ARTIFACT}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
